{% if site.data.theme.browse-child-objects == true %}
{%- assign items = site.data[site.metadata] | where_exp: 'item','item.objectid' -%}
{% else %}
{%- assign items = site.data[site.metadata] | where_exp: 'item','item.objectid and item.parentid == nil' -%}
{% endif %}

<script>

/* =========================
ITEMS (desde CSV)
========================= */
var items = [
{% for item in items %}
{
    "id": {{ item.objectid | jsonify }},
    "title": {{ item.title | jsonify }},
    "location": {{ item.location | jsonify }},
    "date": {{ item.date | jsonify }},
    "collection": {{ item.collection | jsonify }},
    "object_transcript": {{ item.object_transcript | jsonify }},
    "transcript_text": ""
}
{% unless forloop.last %},{% endunless %}
{% endfor %}
];

var collectionsMap = {
{% for c in site.data.collections %}
"{{ c.title | escape }}": "{{ c.id }}",
{% endfor %}
};


/* =========================
CARGAR TRANSCRIPCIONES
========================= */
async function loadTranscripts() {
    const loadingPromises = items.map(async (item) => {
        try {
            if (!item.object_transcript) return;
            
            const response = await fetch(`{{ '/' | relative_url }}${item.object_transcript}`);
            if (!response.ok) return;

            const transcriptText = await response.text();
            item.transcript_text = transcriptText;

        } catch (error) {
            console.log(`Could not load transcript for ${item.id}:`, error);
        }
    });

    await Promise.all(loadingPromises);
    console.log('Transcript text loaded for all items');
}


/* =========================
EXTRAER AÑO
========================= */
function extractYear(dateValue) {
    if (!dateValue) return null;

    dateValue = dateValue.trim();

    if (dateValue.includes("/")) {
        return parseInt(dateValue.split("/").pop());
    }

    if (dateValue.includes("-")) {
        return parseInt(dateValue.split("-").pop());
    }

    return parseInt(dateValue);
}


/* =========================
COLECCIONES DINÁMICAS
========================= */
function populateCollections() {
    var set = new Map();

    items.forEach(item => {
        if (item.collection) {
            set.set(item.collection, item.collection);
        }
    });

    var selects = [
        document.getElementById("newspaper-select"),
        document.getElementById("newspaper-select-2")
    ];

    selects.forEach(select => {
        if (!select) return;

        /* limpiar primero */
        select.innerHTML = '<option value="">Todas las colecciones</option>';

        set.forEach((value) => {
            var opt = document.createElement("option");
            opt.value = value;
            opt.textContent = value;
            select.appendChild(opt);
        });

        /* 🚀 EVENTO BIEN ENGANCHADO */
        select.addEventListener("change", function () {
            if (!this.value) return;

            var id = collectionsMap[this.value];
            if (!id) return;

            window.location.href = "{{ '/collections/' | relative_url }}" + id + ".html";
        });
    });
}


/* =========================
GRÁFICO DE DÉCADAS
========================= */
function buildDecadeChart() {

    var counts = {};
    var chart = document.getElementById("decade-chart");

    if (!chart) return;

    chart.innerHTML = "";

    items.forEach(item => {
        var year = extractYear(item.date);
        if (!year) return;

        var decade = Math.floor(year / 10) * 10;
        counts[decade] = (counts[decade] || 0) + 1;
    });

    var decades = Object.keys(counts).sort();
    var max = Math.max(...Object.values(counts));

    decades.forEach(dec => {

        var wrap = document.createElement("div");
        wrap.className = "bar-wrap";

        var bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = (counts[dec] / max * 80) + "px";

        var label = document.createElement("div");
        label.style.fontSize = "10px";
        label.style.textAlign = "center";
        label.innerText = dec;

        wrap.appendChild(bar);
        wrap.appendChild(label);

        wrap.onclick = () => {
            document.getElementById("year-from").value = dec;
            document.getElementById("year-to").value = parseInt(dec) + 9;
            advancedSearch();
        };

        chart.appendChild(wrap);
    });
}


/* =========================
BÚSQUEDA AVANZADA
========================= */
function advancedSearch() {

    var text = document.getElementById("main-search").value.toUpperCase();
    var collection = document.getElementById("newspaper-select").value;
    var y1 = document.getElementById("year-from").value;
    var y2 = document.getElementById("year-to").value;

    var results = items.filter(item => {

        var year = extractYear(item.date);

        /* 🔍 TEXTO (solo campos específicos) */
        if (text) {
            var content = (
                (item.title || "") + " " +
                (item.location || "") + " " +
                (item.transcript_text || "")
            ).toUpperCase();

            if (!content.includes(text)) return false;
        }

        /* 📰 COLECCIÓN */
        if (collection && item.collection !== collection) return false;

        /* 📅 AÑO */
        if (y1 && year && year < parseInt(y1)) return false;
        if (y2 && year && year > parseInt(y2)) return false;

        return true;
    });

    renderResults(results);
}


/* =========================
RENDER RESULTADOS
========================= */
function renderResults(arr) {

    var container = document.getElementById("results-container");
    if (!container) return;

    if (arr.length === 0) {
        container.innerHTML = "No hay resultados";
        return;
    }

    var html = "";

    arr.forEach(item => {
        html += `
        <div>
            <strong>${item.title}</strong><br>
            ${item.date || ""} — ${item.location || ""}<br>
            <small>${item.collection || ""}</small>
        </div>`;
    });

    container.innerHTML = html;
}


/* =========================
   🚀 INIT
========================= */
loadTranscripts().then(() => {
    populateCollections();
    buildDecadeChart();
    renderResults(items);
});

</script>
