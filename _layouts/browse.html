---
# collection "Browse" page
layout: page
custom-foot: js/browse-js.html
---

{{ content }}

<div class="container py-4">
  <div class="row mb-3 g-2 align-items-center">
    <div class="col-md-6">
      <input type="text" class="form-control" id="filterTextBox" placeholder="Filtrar..." aria-label="Buscar">
    </div>
    <div class="col-md-4">
      <select class="form-select" id="browseSortSelect">
        <option value="random">Aleatorio</option>
        <option value="title">Nombre</option>
        {% assign sort_options = site.data.config-browse | where_exp: 'i','i.sort_name != nil' %}
        {% for o in sort_options %}
        <option value="{{ o.field | escape }}">{{ o.sort_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <button class="btn btn-outline-secondary w-100" style="background-color: #7fc006; border-color: #659a02; color: #000000" onclick="resetFilter(); return false;">Restablecer</button>
    </div>
  </div>

  <div class="text-muted small mb-2" id="numberOf"></div>

  <div id="loadingIcon" class="text-center">
    <div class="spinner-border text-dark" role="status"><span class="visually-hidden">Cargando...</span></div>
  </div>

  <div class="row justify-content-center py-2" id="browseItems"></div>
</div>
