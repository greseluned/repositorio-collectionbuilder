---
layout: page
custom-foot: js/browse-js.html
---

<style>
/* 🎨 PALETA LIGHT (adaptada a Bootstrap) */
:root {
  --primary: #198754;        /* verde bootstrap */
  --primary-dark: #146c43;
  --bg: #ffffff;
  --surface: #f8f9fa;
  --card: #ffffff;
  --border: #dee2e6;
  --text-primary: #212529;
  --text-secondary: #6c757d;
}

/* layout */
.main-layout {
  max-width: 1300px;
  margin: 0 auto;
  padding: 2rem 0;
  display: grid;
  grid-template-columns: 1fr 300px 320px;
  gap: 1.5rem;
}

/* cards */
.search-card, .panel-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
}

/* títulos */
.search-card h1 {
  font-size: 1.6rem;
  margin-bottom: 1rem;
  color: var(--text-primary);
}

.panel-card h3 {
  font-size: 1.2rem;
  margin-bottom: 0.75rem;
}

/* inputs */
.form-field input, 
.form-field select {
  width: 100%;
  background: #fff;
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 0.6rem;
  border-radius: 5px;
  margin-bottom: 0.75rem;
}

/* focus */
.form-field input:focus,
.form-field select:focus {
  border-color: var(--primary);
  outline: none;
}

/* year row */
.year-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.year-group {
  display: flex;
  flex-direction: column;
  flex: 1;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

/* botón */
.search-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0.55rem 1.5rem;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 500;
}

.search-btn:hover {
  background: var(--primary-dark);
}

/* side panels */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* gráfico décadas */
.decade-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 80px;
}

.bar-wrap {
  flex: 1;
  cursor: pointer;
}

.bar {
  width: 100%;
  background: var(--primary);
  border-radius: 2px 2px 0 0;
  transition: background 0.2s;
}

.bar-wrap:hover .bar {
  background: var(--primary-dark);
}

/* resultados */
#results-container div {
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
}

#results-container strong {
  color: var(--text-primary);
}
</style>

<div class="main-layout">

  <!-- 🔍 SEARCH -->
  <div class="search-card">
    <h1>Búsqueda avanzada</h1>

    <div class="form-field">
      <input type="text" id="main-search" placeholder="Buscar en títulos, metadatos y/o transcripciones...">
    </div>

    <div class="form-field">
      <select id="newspaper-select">
        <option value="">Todos los periódicos</option>
      </select>
    </div>

    <div class="year-row">
      <div class="year-group">
        <label>Desde</label>
        <input type="number" id="year-from">
      </div>
      <div class="year-group">
        <label>Hasta</label>
        <input type="number" id="year-to">
      </div>
    </div>

    <button class="search-btn" onclick="advancedSearch()">Buscar</button>
  </div>

  <!-- 📊 PANEL CENTRAL -->
  <div class="side-panel">

    <div class="panel-card">
      <h3>Ver periódicos de colecciones específicas</h3>
      <select id="newspaper-select-2" class="form-select">
        <option value="">Seleccionar</option>
      </select>
    </div>

    <div class="panel-card">
      <h3>Décadas</h3>
      <div id="decade-chart" class="decade-chart"></div>
    </div>

  </div>

  <!-- 📦 RESULTADOS -->
  <div class="side-panel">
    <div class="panel-card">
      <h3>Resultados</h3>
      <div id="results-container"></div>
    </div>
  </div>

</div>
