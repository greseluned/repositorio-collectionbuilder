---
layout: page
---
{% assign collections = site.data.collections %}

<style>
.results-header {
  background: #1a1a2e;
  color: #fff;
  padding: 1.5rem 2rem;
  margin: -1.5rem -15px 1.5rem -15px;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.results-header h1 { font-size: 1.25rem; font-weight: 700; margin: 0; }
.results-header .query-badge {
  background: #7fc006;
  color: #000;
  font-weight: 700;
  padding: 0.25rem 0.75rem;
  border-radius: 4px;
  font-size: 1rem;
}

/* Sidebar */
.facet-sidebar { position: sticky; top: 1rem; }
.facet-section { border-bottom: 1px solid #e9ecef; padding-bottom: 1rem; margin-bottom: 1rem; }
.facet-section:last-child { border-bottom: none; }
.facet-title {
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #495057;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}
.facet-list { list-style: none; padding: 0; margin: 0; font-size: 0.875rem; }
.facet-list li { display: flex; justify-content: space-between; align-items: center; padding: 0.2rem 0; }
.facet-list li label { cursor: pointer; color: #333; flex: 1; }
.facet-list li label:hover { color: #7fc006; }
.facet-count { background: #e9ecef; border-radius: 10px; padding: 0.1rem 0.5rem; font-size: 0.75rem; color: #666; }
.facet-count.active-count { background: #7fc006; color: #000; font-weight: 700; }

.btn-clear { font-size: 0.8rem; color: #666; text-decoration: none; }
.btn-clear:hover { color: #c00; }

/* Results list */
.result-item {
  border: 1px solid #e9ecef;
  border-radius: 6px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  background: #fff;
  transition: box-shadow 0.15s;
}
.result-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.result-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.35rem; }
.result-title a { color: #1a1a2e; text-decoration: none; }
.result-title a:hover { color: #7fc006; }
.result-snippet { font-size: 0.875rem; color: #444; line-height: 1.6; margin-bottom: 0.5rem; }
.result-snippet mark { background: #fff3cd; color: #000; font-weight: 600; padding: 0 2px; border-radius: 2px; }
.result-meta { font-size: 0.78rem; color: #888; display: flex; gap: 1.25rem; flex-wrap: wrap; }
.result-meta span strong { color: #555; }
.result-loading { font-size: 0.8rem; color: #aaa; font-style: italic; }

/* Sort bar */
.sort-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
.sort-bar .result-count { font-size: 0.9rem; color: #555; }
.sort-bar select { font-size: 0.875rem; padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid #ced4da; }

/* Pagination */
.pagination .page-link { color: #1a1a2e; }
.pagination .page-item.active .page-link { background-color: #7fc006; border-color: #659a02; color: #000; }
.pagination .page-link:hover { color: #7fc006; }

/* Search within */
.search-within { margin-bottom: 1rem; }
.search-within .input-group { max-width: 100%; }
.search-within .form-control { font-size: 0.875rem; }

#loadingOverlay { text-align: center; padding: 3rem; color: #888; }
</style>

<div class="results-header">
  <h1>Resultados</h1>
  <span id="headerQuery" class="query-badge" style="display:none"></span>
  <span id="headerCount" style="color:#adb5bd; font-size:0.9rem;"></span>
</div>

<div class="row g-3">
  <!-- Sidebar -->
  <div class="col-lg-3">
    <div class="facet-sidebar">
      <div class="search-within mb-3">
        <div class="input-group">
          <input type="text" class="form-control" id="refineQuery" placeholder="Buscar en resultados...">
          <button class="btn btn-outline-secondary btn-sm" onclick="refineSearch()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
          </button>
        </div>
      </div>

      <a href="#" class="btn-clear" onclick="clearAll(); return false;">Limpiar selecciones</a>

      <div class="facet-section mt-2">
        <div class="facet-title" onclick="toggleFacet('facetCollection')">
          Publicación <span id="facetCollectionArrow">▾</span>
        </div>
        <ul class="facet-list" id="facetCollection"></ul>
      </div>

      <div class="facet-section">
        <div class="facet-title" onclick="toggleFacet('facetLocation')">
          Lugar <span id="facetLocationArrow">▾</span>
        </div>
        <ul class="facet-list" id="facetLocation"></ul>
      </div>

      <div class="facet-section">
        <div class="facet-title" onclick="toggleFacet('facetDecade')">
          Década <span id="facetDecadeArrow">▾</span>
        </div>
        <ul class="facet-list" id="facetDecade"></ul>
      </div>

      <div class="facet-section">
        <div class="facet-title" onclick="toggleFacet('facetYear')">
          Año <span id="facetYearArrow">▾</span>
        </div>
        <ul class="facet-list" id="facetYear"></ul>
      </div>

      <div class="facet-section">
        <div class="facet-title" onclick="toggleFacet('facetLang')">
          Idioma <span id="facetLangArrow">▾</span>
        </div>
        <ul class="facet-list" id="facetLang"></ul>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="col-lg-9">
    <div class="sort-bar">
      <span class="result-count" id="resultCount"></span>
      <select id="sortSelect" onchange="renderPage(1)">
        <option value="score">Relevancia</option>
        <option value="date-asc">Fecha (más antigua primero)</option>
        <option value="date-desc">Fecha (más reciente primero)</option>
        <option value="title">Título (A→Z)</option>
      </select>
    </div>

    <div id="loadingOverlay">
      <div class="spinner-border text-secondary" role="status"></div>
      <p class="mt-2">Cargando índice...</p>
    </div>

    <div id="resultsList"></div>

    <nav>
      <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
  </div>
</div>

<script>
// --- State ---
const RESULTS_PER_PAGE = 10;
const KWIC_WINDOW = 120; // chars around keyword

let allItems = [];         // full metadata index
let filteredItems = [];    // after metadata + facet filters
let enrichedItems = {};    // id -> transcript text (fetched on demand)
let activeFacets = { collection: [], location: [], decade: [], year: [], lang: [] };
let currentQuery = "";
let currentPage = 1;
let indexLoaded = false;

// Parse URL params
const urlParams = new URLSearchParams(window.location.search);
const initialQuery = urlParams.get("q") || "";
const initialCollection = urlParams.get("collection") || "";
const initialFrom = urlParams.get("from") ? parseInt(urlParams.get("from")) : null;
const initialTo = urlParams.get("to") ? parseInt(urlParams.get("to")) : null;
const initialLang = urlParams.get("lang") ? urlParams.get("lang").split(",") : [];
const initialLocation = urlParams.get("location") || "";

// Collection id -> title map from Jekyll
const collectionTitles = {
  {% for coll in collections %}"{{ coll.id }}": {{ coll.title | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}
};

// --- Load index ---
async function loadIndex() {
  const resp = await fetch("{{ '/assets/data/search-index.json' | relative_url }}");
  allItems = await resp.json();
  indexLoaded = true;
  document.getElementById("loadingOverlay").style.display = "none";

  // Apply initial filters from URL
  currentQuery = initialQuery;
  if (initialCollection) activeFacets.collection = [initialCollection];
  if (initialLang.length) activeFacets.lang = initialLang;
  if (initialLocation) activeFacets.location = [initialLocation];

  applyFilters();
}

// --- Metadata filter (no transcript) ---
function metadataMatch(item) {
  // date range
  if (initialFrom || initialTo) {
    const year = extractYear(item.date);
    if (initialFrom && year < initialFrom) return false;
    if (initialTo && year > initialTo) return false;
  }
  return true;
}

function extractYear(dateStr) {
  if (!dateStr) return 0;
  // handle DD-MM-YYYY
  const parts = dateStr.split("-");
  if (parts.length === 3 && parts[2].length === 4) return parseInt(parts[2]);
  if (parts[0].length === 4) return parseInt(parts[0]);
  return parseInt(parts[parts.length - 1]) || 0;
}

function extractMonth(dateStr) {
  if (!dateStr) return 0;
  const parts = dateStr.split("-");
  if (parts.length === 3 && parts[2].length === 4) return parseInt(parts[1]);
  return 0;
}

// --- Facet filter ---
function facetMatch(item) {
  if (activeFacets.collection.length && !activeFacets.collection.includes(item.collection)) return false;
  if (activeFacets.location.length && !activeFacets.location.includes(item.location)) return false;
  if (activeFacets.lang.length && !activeFacets.lang.includes(item.language)) return false;
  if (activeFacets.decade.length) {
    const decade = Math.floor(extractYear(item.date) / 10) * 10;
    if (!activeFacets.decade.includes(String(decade))) return false;
  }
  if (activeFacets.year.length) {
    const year = extractYear(item.date);
    if (!activeFacets.year.includes(String(year))) return false;
  }
  return true;
}

// --- Title match ---
function titleMatch(item, query) {
  if (!query) return true;
  return item.title && item.title.toLowerCase().includes(query.toLowerCase());
}

// --- KWIC snippet ---
function getSnippet(text, query) {
  if (!text || !query) return null;
  const lText = text.toLowerCase();
  const lQuery = query.toLowerCase();
  const idx = lText.indexOf(lQuery);
  if (idx === -1) return null;
  const start = Math.max(0, idx - KWIC_WINDOW / 2);
  const end = Math.min(text.length, idx + query.length + KWIC_WINDOW / 2);
  let snippet = (start > 0 ? "…" : "") + text.slice(start, end) + (end < text.length ? "…" : "");
  // highlight
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  snippet = snippet.replace(re, "<mark>$1</mark>");
  return snippet;
}

// --- Apply all filters and render ---
function applyFilters() {
  const query = currentQuery.trim();

  // First pass: metadata + facets (no transcript)
  let candidates = allItems.filter(item => metadataMatch(item) && facetMatch(item));

  // Title matches — show immediately
  let titleMatches = candidates.filter(item => titleMatch(item, query));
  let transcriptMatches = []; // filled async

  // Items that need transcript checking
  let needsTranscript = query ? candidates.filter(item => !titleMatch(item, query) && item.transcript) : [];

  filteredItems = titleMatches;
  buildFacets(filteredItems);
  sortAndRender();

  // Update header
  updateHeader(query, filteredItems.length);

  // Second pass: fetch transcripts for remaining candidates
  if (needsTranscript.length && query) {
    fetchTranscripts(needsTranscript, query);
  }
}

async function fetchTranscripts(items, query) {
  const promises = items.map(async item => {
    if (enrichedItems[item.id] !== undefined) {
      // Already fetched
      if (enrichedItems[item.id].toLowerCase().includes(query.toLowerCase())) {
        return item;
      }
      return null;
    }
    try {
      const resp = await fetch("{{ '/' | relative_url }}" + item.transcript.trim());
      if (!resp.ok) { enrichedItems[item.id] = ""; return null; }
      const text = await resp.text();
      enrichedItems[item.id] = text;
      if (text.toLowerCase().includes(query.toLowerCase())) return item;
      return null;
    } catch(e) { enrichedItems[item.id] = ""; return null; }
  });

  const results = await Promise.all(promises);
  const newMatches = results.filter(Boolean);
  if (newMatches.length) {
    filteredItems = [...filteredItems, ...newMatches];
    buildFacets(filteredItems);
    sortAndRender();
    updateHeader(query, filteredItems.length);
  }
}

function updateHeader(query, count) {
  const qBadge = document.getElementById("headerQuery");
  const countEl = document.getElementById("headerCount");
  if (query) {
    qBadge.textContent = query;
    qBadge.style.display = "";
  }
  countEl.textContent = count + (count === 1 ? " resultado" : " resultados");
}

// --- Sort ---
function getSortedItems() {
  const sort = document.getElementById("sortSelect").value;
  const items = [...filteredItems];
  if (sort === "date-asc") {
    items.sort((a, b) => extractYear(a.date) - extractYear(b.date) || extractMonth(a.date) - extractMonth(b.date));
  } else if (sort === "date-desc") {
    items.sort((a, b) => extractYear(b.date) - extractYear(a.date) || extractMonth(b.date) - extractMonth(a.date));
  } else if (sort === "title") {
    items.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
  }
  // "score" = default order (title matches first, then transcript)
  return items;
}

// --- Render page ---
function sortAndRender() { renderPage(currentPage); }

function renderPage(page) {
  currentPage = page;
  const sorted = getSortedItems();
  const total = sorted.length;
  const totalPages = Math.ceil(total / RESULTS_PER_PAGE);
  const start = (page - 1) * RESULTS_PER_PAGE;
  const pageItems = sorted.slice(start, start + RESULTS_PER_PAGE);

  document.getElementById("resultCount").textContent =
    "Mostrando " + (start + 1) + "–" + Math.min(start + RESULTS_PER_PAGE, total) + " de " + total + " resultados";

  const query = currentQuery.trim();
  let html = "";
  pageItems.forEach(item => {
    const year = extractYear(item.date);
    const collTitle = collectionTitles[item.collection] || item.collection;
    const href = "{{ '/items/' | relative_url }}" + item.id + ".html";
    const thumbHtml = item.thumb ? `<img src="${item.thumb}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;float:right;margin-left:1rem;" alt="">` : "";

    // Snippet from transcript if available
    let snippetHtml = "";
    if (query && enrichedItems[item.id]) {
      const snippet = getSnippet(enrichedItems[item.id], query);
      if (snippet) {
        snippetHtml = `<div class="result-snippet">${snippet}</div>`;
      }
    } else if (query && item.transcript && enrichedItems[item.id] === undefined) {
      snippetHtml = `<div class="result-loading">Cargando transcripción...</div>`;
    }

    html += `
      <div class="result-item">
        ${thumbHtml}
        <div class="result-title"><a href="${href}">${item.title || item.id}</a></div>
        ${snippetHtml}
        <div class="result-meta">
          <span><strong>Publicación:</strong> ${collTitle}</span>
          <span><strong>Fecha:</strong> ${item.date || "—"}</span>
          ${item.location ? `<span><strong>Lugar:</strong> ${item.location}</span>` : ""}
          ${item.language ? `<span><strong>Idioma:</strong> ${item.language}</span>` : ""}
        </div>
      </div>`;
  });

  document.getElementById("resultsList").innerHTML = html || '<p class="text-muted">No se encontraron resultados.</p>';
  renderPagination(page, totalPages);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// --- Pagination ---
function renderPagination(current, total) {
  if (total <= 1) { document.getElementById("pagination").innerHTML = ""; return; }
  let html = "";
  if (current > 1) html += `<li class="page-item"><a class="page-link" href="#" onclick="renderPage(${current-1});return false;">‹</a></li>`;
  for (let i = Math.max(1, current-2); i <= Math.min(total, current+2); i++) {
    html += `<li class="page-item ${i===current?'active':''}"><a class="page-link" href="#" onclick="renderPage(${i});return false;">${i}</a></li>`;
  }
  if (current < total) html += `<li class="page-item"><a class="page-link" href="#" onclick="renderPage(${current+1});return false;">›</a></li>`;
  document.getElementById("pagination").innerHTML = html;
}

// --- Facets ---
function buildFacets(items) {
  buildFacet("facetCollection", items, i => i.collection, v => collectionTitles[v] || v, "collection");
  buildFacet("facetLocation", items, i => i.location, v => v, "location");
  buildFacet("facetDecade", items, i => {
    const y = extractYear(i.date); return y ? String(Math.floor(y/10)*10) : null;
  }, v => v + "s", "decade");
  buildFacet("facetYear", items, i => {
    const y = extractYear(i.date); return y ? String(y) : null;
  }, v => v, "year");
  buildFacet("facetLang", items, i => i.language, v => v, "lang");
}

function buildFacet(elId, items, keyFn, labelFn, facetKey) {
  const counts = {};
  items.forEach(item => {
    const v = keyFn(item);
    if (v) counts[v] = (counts[v] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const el = document.getElementById(elId);
  el.innerHTML = sorted.map(([val, count]) => {
    const checked = activeFacets[facetKey].includes(val) ? "checked" : "";
    const activeClass = checked ? "active-count" : "";
    return `<li>
      <input type="checkbox" id="${elId}-${val}" ${checked} onchange="toggleFacetValue('${facetKey}','${val}')">
      <label for="${elId}-${val}">&nbsp;${labelFn(val)}</label>
      <span class="facet-count ${activeClass}">${count}</span>
    </li>`;
  }).join("");
}

function toggleFacetValue(facetKey, val) {
  const arr = activeFacets[facetKey];
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val);
  else arr.splice(idx, 1);
  applyFilters();
}

function toggleFacet(elId) {
  const el = document.getElementById(elId);
  const arrow = document.getElementById(elId + "Arrow");
  if (el.style.display === "none") {
    el.style.display = "";
    arrow.textContent = "▾";
  } else {
    el.style.display = "none";
    arrow.textContent = "▸";
  }
}

function clearAll() {
  activeFacets = { collection: [], location: [], decade: [], year: [], lang: [] };
  document.getElementById("refineQuery").value = "";
  currentQuery = initialQuery;
  applyFilters();
}

function refineSearch() {
  currentQuery = document.getElementById("refineQuery").value || initialQuery;
  applyFilters();
}

document.getElementById("refineQuery").addEventListener("keydown", function(e) {
  if (e.key === "Enter") refineSearch();
});

// Boot
loadIndex();
</script>
