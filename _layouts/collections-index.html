---
layout: page
---
{% assign meta = site.data[site.metadata] %}

<div class="container py-4">
  <h1>{{ page.title }}</h1>
  <ul class="list-group list-group-flush">
    {% for coll in site.data.collections %}
      {% assign items = meta | where: "collection", coll.id %}
      <li class="list-group-item d-flex justify-content-between align-items-center px-0">
        <a href="{{ coll.id | prepend: '/collections/' | append: '/' | relative_url }}">
          {{ coll.title }}
        </a>
        <span class="badge bg-secondary rounded-pill">{{ items.size }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
